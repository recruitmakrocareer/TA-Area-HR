<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { Users, UserPlus, BarChart3, Building2, CheckCircle2, Clock, MapPin, Search, AlertCircle, FileText, Briefcase, Phone, MessageSquare, Map, Target, Edit, Trash2, X, BellRing, Download, Paperclip, Upload, Eye, PlusCircle, Settings, Check, Filter, Loader2, Send, Printer } from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';

    // วาง URL ของ Google Apps Script ของคุณที่นี่
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8gOemK9nDgFTffllbI15AelpJKzA5Kk-pFwwH7BoYZ6PFdGHR6FqK53-O_KnBpsyWCQ/exec"; 

    const DEFAULT_TAS = ['TA 1 (คุณเอ)', 'TA 2 (คุณบี)', 'TA 3 (คุณซี)', 'TA 4 (คุณดี)'];
    const DEFAULT_POSITIONS = [
      { position: 'ผู้จัดการสาขา', recruit: '', area: '' },
      { position: 'ผู้ช่วยผู้จัดการสาขา', recruit: '', area: '' },
      { position: 'พนักงานขาย', recruit: '', area: '' },
      { position: 'พนักงานแคชเชียร์', recruit: '', area: '' }
    ];

    const DEFAULT_BRANCHES = [
      { code: '001', name: 'สาขาลาดพร้าว', area: 'Area 5' },
      { code: '002', name: 'สาขาแจ้งวัฒนะ', area: 'Area 10' },
      { code: '003', name: 'สาขาศรีนครินทร์', area: 'Area 11' },
      { code: '004', name: 'สาขาบางบอน', area: 'Area 1' }
    ];

    const STATUSES = ['รอพิจารณาประวัติ', 'ผ่านสัมภาษณ์', 'รอผลสัมภาษณ์', 'ติดต่อผู้สมัครไม่ได้', 'อยู่ระหว่างนัดสัมภาษณ์', 'ยกเลิกสัมภาษณ์/ไม่มาตามนัด', 'ไม่ผ่านสัมภาษณ์', 'ไม่มีตำแหน่งงานว่าง', 'สำรอง/เก็บไว้พิจารณา', 'ตรวจสุขภาพ', 'รอเริ่มงาน', 'อื่นๆ'];
    const VACANCY_STATUSES = ['Vacant', 'Promote&Transfer', 'Promote&Transfer Done', 'Hold', 'Closed'];

    const STATUS_COLORS = { 
      'รอพิจารณาประวัติ': '#06B6D4', 'ผ่านสัมภาษณ์': '#10B981', 'รอผลสัมภาษณ์': '#3B82F6', 
      'ติดต่อผู้สมัครไม่ได้': '#64748B', 'อยู่ระหว่างนัดสัมภาษณ์': '#F59E0B', 'ยกเลิกสัมภาษณ์/ไม่มาตามนัด': '#EF4444', 
      'ไม่ผ่านสัมภาษณ์': '#DC2626', 'ไม่มีตำแหน่งงานว่าง': '#94A3B8', 'สำรอง/เก็บไว้พิจารณา': '#8B5CF6', 
      'ตรวจสุขภาพ': '#06B6D4', 'รอเริ่มงาน': '#0EA5E9', 'อื่นๆ': '#F97316' 
    };
    
    const VACANCY_COLORS = { 
      'Vacant': '#F59E0B', 'Promote&Transfer': '#8B5CF6', 'Promote&Transfer Done': '#10B981', 
      'Hold': '#64748B', 'Closed': '#94A3B8', 'รอตรวจสุขภาพ': '#06B6D4', 
      'Waiting to Join': '#0EA5E9', 'Hired': '#10B981' 
    };

    const parseDateToMs = (val) => {
      if (!val) return null;
      let cleanStr = String(val).replace(/,/g, '').trim();
      let num = Number(cleanStr);
      if (!isNaN(num) && num > 1000000000000) return num;
      if (!isNaN(num) && num > 30000 && num < 100000) return new Date(Math.round((num - 25569) * 86400 * 1000)).getTime();
      let d = new Date(val);
      if (!isNaN(d.getTime())) return d.getTime();
      if (typeof val === 'string' && (val.includes('/') || val.includes('-'))) {
        let datePart = val.split(' ')[0];
        let parts = datePart.includes('/') ? datePart.split('/') : datePart.split('-');
        if (parts.length >= 2) {
          let p1 = parseInt(parts[0], 10), p2 = parseInt(parts[1], 10), p3 = parts.length === 3 ? parseInt(parts[2], 10) : new Date().getFullYear();
          let day = p1, month = p2 - 1, year = p3;
          if (p1 > 1000) { year = p1; month = p2 - 1; day = parts.length === 3 ? parseInt(parts[2], 10) : 1; }
          if (year > 2500) year -= 543; 
          if (year >= 2000) { 
             let d2 = new Date(year, month, day);
             if (!isNaN(d2.getTime())) return d2.getTime();
          }
        }
      }
      return null;
    };

    const getConsistentTimestamp = () => {
      const d = new Date();
      const day = String(d.getDate()).padStart(2, '0'), month = String(d.getMonth() + 1).padStart(2, '0'), year = d.getFullYear();
      const hrs = String(d.getHours()).padStart(2, '0'), mins = String(d.getMinutes()).padStart(2, '0'), secs = String(d.getSeconds()).padStart(2, '0');
      return `${day}/${month}/${year} ${hrs}:${mins}:${secs}`;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('area_hr');
      const [isLoading, setIsLoading] = useState(true); 
      const [isSaving, setIsSaving] = useState(false); 
      const [isSendingLine, setIsSendingLine] = useState(false);
      const [cloudStatus, setCloudStatus] = useState('loading'); 
      const [appBranches, setAppBranches] = useState([]);
      const [appAreas, setAppAreas] = useState([]);
      const [appTAs, setAppTAs] = useState([]);
      const [appPositions, setAppPositions] = useState([]);
      const [showSettings, setShowSettings] = useState(false);
      const [selectedTA, setSelectedTA] = useState('');
      const [recruitAreaFilter, setRecruitAreaFilter] = useState('');
      const [recruitBranchFilter, setRecruitBranchFilter] = useState('');
      const [addingApplicantFor, setAddingApplicantFor] = useState(null);
      const [formData, setFormData] = useState({ name: '', phone: '', status: '', comment: '', startDate: '', resumeName: '', resumeBase64: '' });
      const [applicants, setApplicants] = useState([]);
      const [editAppId, setEditAppId] = useState(null);
      const [editAppForm, setEditAppForm] = useState({});
      const [previewFile, setPreviewFile] = useState(null);
      const [selectedAreas, setSelectedAreas] = useState([]);
      const [vacancyForm, setVacancyForm] = useState({ branchCode: '', position: '', manualStatus: 'Vacant', effectiveDate: '' });
      const [viewApplicants, setViewApplicants] = useState(null);
      const [vacancies, setVacancies] = useState([]);
      const [editVacId, setEditVacId] = useState(null);
      const [editVacForm, setEditVacForm] = useState({});
      
      const [lineToken, setLineToken] = useState(localStorage.getItem('hr_line_token') || '');
      
      const [dashboardTA, setDashboardTA] = useState('ALL');
      const [vacancyPositionFilter, setVacancyPositionFilter] = useState('');
      const [vacancyBranchFilter, setVacancyBranchFilter] = useState('');
      const [dashboardDetailModal, setDashboardDetailModal] = useState(null);
      const [dashboardAreaFilter, setDashboardAreaFilter] = useState('');
      const [dashboardBranchFilter, setDashboardBranchFilter] = useState('');

      const uniquePositionNames = useMemo(() => [...new Set(appPositions.map(p => p.position))], [appPositions]);

      const fetchFreshData = async () => {
        if (!GOOGLE_SCRIPT_URL) return null;
        try {
          const res = await fetch(`${GOOGLE_SCRIPT_URL}?t=${new Date().getTime()}`);
          const data = await res.json();
          
          let loadedApps = []; let loadedVacs = [];
          
          if (data.applicants) loadedApps = data.applicants.map(a => ({...a, id: String(a.id), branchCode: String(a.branchCode).padStart(3, '0')}));
          if (data.vacancies) loadedVacs = data.vacancies.map(v => ({...v, id: String(v.id), branchCode: String(v.branchCode).padStart(3, '0')}));
          
          setApplicants(loadedApps);
          setVacancies(loadedVacs);
          
          const safeAppsForLocal = loadedApps.map(app => ({
            ...app, resumeBase64: (app.resumeBase64 && app.resumeBase64.length > 1000 && !String(app.resumeBase64).startsWith('http')) ? 'Uploaded' : app.resumeBase64
          }));
          localStorage.setItem('hr_applicants', JSON.stringify(safeAppsForLocal));
          localStorage.setItem('hr_vacancies', JSON.stringify(loadedVacs));
          
          return data;
        } catch (error) {
          console.error('Fetch fresh data error:', error);
          throw error;
        }
      };

      useEffect(() => {
        const normalizePositions = (positions) => {
          return positions.map(p => {
            if (typeof p === 'string') return { position: p, recruit: '', area: '' };
            return { position: String(p.position || p.name || '').trim(), recruit: String(p.recruit || '').trim(), area: String(p.area || '').trim() };
          });
        };

        const initLoad = async () => {
          setIsLoading(true); setCloudStatus('loading');
          try {
            const data = await fetchFreshData(); 
            if (data) {
              setCloudStatus('connected');
              if (data.branches && data.branches.length > 0) {
                  setAppBranches(data.branches.map(b => ({...b, code: String(b.code).padStart(3, '0'), name: String(b.name).trim() === 'Ma' ? 'สาขาศาลายา' : String(b.name).trim()})));
              } else setAppBranches(DEFAULT_BRANCHES);
              if (data.tas && data.tas.length > 0) setAppTAs(data.tas.map(t => String(t.name || t)));
              else setAppTAs(DEFAULT_TAS);
              if (data.positions && data.positions.length > 0) setAppPositions(normalizePositions(data.positions));
              else setAppPositions(DEFAULT_POSITIONS);
            }
          } catch (e) {
            setCloudStatus('error');
            let loadedApps = []; let loadedVacs = [];
            let localApps = localStorage.getItem('hr_applicants'); let localVacs = localStorage.getItem('hr_vacancies');
            if (localApps) loadedApps = JSON.parse(localApps); if (localVacs) loadedVacs = JSON.parse(localVacs);
            
            setApplicants(loadedApps); setVacancies(loadedVacs);
            const localBranches = localStorage.getItem('hr_branches');
            if (localBranches) { try { setAppBranches(JSON.parse(localBranches).map(b => ({...b, name: String(b.name).trim() === 'Ma' ? 'สาขาศาลายา' : String(b.name).trim()}))); } catch(err) {} }
            else setAppBranches(DEFAULT_BRANCHES);
            const localTAs = localStorage.getItem('hr_tas');
            if (localTAs) { try { setAppTAs(JSON.parse(localTAs)); } catch(e) {} } else setAppTAs(DEFAULT_TAS);
            const localPositions = localStorage.getItem('hr_positions');
            if (localPositions) { try { setAppPositions(normalizePositions(JSON.parse(localPositions))); } catch(e) {} } else setAppPositions(DEFAULT_POSITIONS);
          }
          setIsLoading(false);
        };
        initLoad();
      }, []);

      useEffect(() => {
        if (appBranches.length > 0) {
          const uniqueAreas = [...new Set(appBranches.map(b => String(b.area)))].sort((a,b) => {
            const numA = parseInt(a.replace(/\D/g, '')) || 0; const numB = parseInt(b.replace(/\D/g, '')) || 0;
            return numA - numB;
          });
          setAppAreas(uniqueAreas);
        }
      }, [appBranches]);

      const handleViewResume = (e, fileData, fileName) => {
        if (e) e.stopPropagation();
        if (!fileData || fileData === 'Uploaded') return;
        const fileString = String(fileData);
        if (fileString.startsWith('http')) window.open(fileString, '_blank');
        else if (fileString.startsWith('Error')) alert('เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: \n' + fileString);
        else setPreviewFile({ name: fileName || 'Resume', base64: fileString });
      };

      const syncToCloud = async (newApps, newVacs, forceSync = false) => {
        const safeAppsForLocal = newApps.map(app => ({
          ...app, resumeBase64: (app.resumeBase64 && app.resumeBase64.length > 1000 && !app.resumeBase64.startsWith('http')) ? 'Uploaded' : app.resumeBase64
        }));
        try {
          localStorage.setItem('hr_applicants', JSON.stringify(safeAppsForLocal));
          localStorage.setItem('hr_vacancies', JSON.stringify(newVacs));
        } catch (err) {}

        const isSafeToSync = forceSync || cloudStatus === 'connected' || cloudStatus === 'syncing';
        if (!isSafeToSync) { alert('⚠️ คุณอยู่ใน "โหมดออฟไลน์" ระบบจะบันทึกในเครื่องเท่านั้น'); return; }
        if (GOOGLE_SCRIPT_URL) {
          try {
            setCloudStatus('syncing');
            await fetch(GOOGLE_SCRIPT_URL, {
              method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'saveAll', applicants: newApps, vacancies: newVacs })
            });
            setTimeout(() => setCloudStatus('connected'), 1000);
          } catch (error) { setCloudStatus('error'); throw error; }
        }
      };

      const syncMasterToCloud = async (newBranches, newTAs, newPositions) => {
        if (cloudStatus === 'error') { alert('❌ ออฟไลน์อยู่ อัปเดต Master ไม่ได้'); return; }
        setIsLoading(true); setCloudStatus('syncing');
        if (GOOGLE_SCRIPT_URL) {
          try {
            await fetch(GOOGLE_SCRIPT_URL, {
              method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'updateMaster', branches: newBranches, tas: newTAs.map(name => ({name})), positions: newPositions })
            });
            setCloudStatus('connected'); alert('อัปเดต Master Data สำเร็จ!');
          } catch (error) { setCloudStatus('error'); alert('อัปเดตไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต'); }
        }
        setIsLoading(false);
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const wb = XLSX.read(evt.target.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
            const newBranches = [];
            for (let i = 1; i < data.length; i++) {
              if (data[i] && data[i][0] && data[i][1] && data[i][2]) {
                let finalName = String(data[i][1]).replace(/\n|\r/g, '').trim() === 'Ma' ? 'สาขาศาลายา' : String(data[i][1]).replace(/\n|\r/g, '').trim();
                newBranches.push({ code: String(data[i][0]).padStart(3, '0'), name: finalName, area: String(data[i][2]).replace(/\r/g, '').trim() });
              }
            }
            if (newBranches.length > 0) {
              setAppBranches(newBranches); localStorage.setItem('hr_branches', JSON.stringify(newBranches));
              syncMasterToCloud(newBranches, appTAs, appPositions);
            } else alert('ไม่พบข้อมูล หรือรูปแบบคอลัมน์ไม่ถูกต้อง');
          } catch (err) { alert('เกิดข้อผิดพลาดในการอ่านไฟล์'); }
        };
        reader.readAsBinaryString(file);
      };

      const handleImportPositionCSV = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const wb = XLSX.read(evt.target.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
            const newPositions = []; const newTAsSet = new Set(appTAs); let foundNewTA = false;
            for (let i = 1; i < data.length; i++) {
              if (data[i] && data[i][0]) {
                const posName = String(data[i][0]).replace(/\r/g, '').trim();
                const recruitName = data[i][1] ? String(data[i][1]).replace(/\r/g, '').trim() : '';
                const areaName = data[i][2] ? String(data[i][2]).replace(/\r/g, '').trim() : '';
                if (posName) {
                  newPositions.push({ position: posName, recruit: recruitName, area: areaName });
                  if (recruitName && !newTAsSet.has(recruitName)) { newTAsSet.add(recruitName); foundNewTA = true; }
                }
              }
            }
            if (newPositions.length > 0) {
              setAppPositions(newPositions); localStorage.setItem('hr_positions', JSON.stringify(newPositions));
              const updatedTAs = Array.from(newTAsSet);
              if (foundNewTA) { setAppTAs(updatedTAs); localStorage.setItem('hr_tas', JSON.stringify(updatedTAs)); }
              syncMasterToCloud(appBranches, updatedTAs, newPositions);
              alert(`อัปเดตสำเร็จ! ตำแหน่งทั้งหมด ${newPositions.length} รายการ`);
            } else alert('ไม่พบข้อมูลตำแหน่งในคอลัมน์แรก');
          } catch (err) { alert('เกิดข้อผิดพลาดในการอ่านไฟล์'); }
        };
        reader.readAsBinaryString(file);
      };

      const handleImportTACSV = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const wb = XLSX.read(evt.target.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
            const newTAs = [];
            for (let i = 1; i < data.length; i++) {
              if (data[i] && data[i][0]) newTAs.push(String(data[i][0]).replace(/\r/g, '').trim());
            }
            if (newTAs.length > 0) {
              setAppTAs(newTAs); localStorage.setItem('hr_tas', JSON.stringify(newTAs));
              syncMasterToCloud(appBranches, newTAs, appPositions);
            } else alert('ไม่พบข้อมูล TA');
          } catch (err) { alert('ข้อผิดพลาดในการอ่านไฟล์'); }
        };
        reader.readAsBinaryString(file);
      };

      const exportToExcel = (dataList, filename) => {
        const ws = XLSX.utils.json_to_sheet(dataList);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${filename}.xlsx`);
      };

      const exportDashboardToPDF = () => {
        const element = document.getElementById('dashboard-export-area');
        if (!element) return;
        
        const buttonsToHide = document.querySelectorAll('.hide-on-pdf');
        buttonsToHide.forEach(btn => btn.style.display = 'none');

        const opt = {
          margin:       [0.3, 0.3, 0.3, 0.3],
          filename:     `HR_Report_${getConsistentTimestamp().replace(/[:\/ ]/g, '_')}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true, logging: false },
          jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
          buttonsToHide.forEach(btn => btn.style.display = '');
        });
      };

      const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 3145728) { alert("ไฟล์มีขนาดใหญ่เกินไป กรุณาแนบไฟล์ขนาดไม่เกิน 3MB"); e.target.value = ''; return; }
          const reader = new FileReader();
          reader.onloadend = () => setFormData(prev => ({ ...prev, resumeBase64: reader.result, resumeName: file.name }));
          reader.readAsDataURL(file);
        }
      };

      const handleEditFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 3145728) { alert("ไฟล์มีขนาดใหญ่เกินไป กรุณาแนบไฟล์ขนาดไม่เกิน 3MB"); e.target.value = ''; return; }
          const reader = new FileReader();
          reader.onloadend = () => { setEditAppForm(prev => ({ ...prev, resumeBase64: reader.result, resumeName: file.name })); };
          reader.readAsDataURL(file);
        }
      };
      
      const handleRecruitSubmit = async (e) => {
        e.preventDefault();
        if (!selectedTA || !addingApplicantFor) return;
        if (formData.status === 'รอเริ่มงาน' && !formData.startDate) { alert('กรุณาระบุวันที่เริ่มงาน'); return; }
        
        setIsSaving(true);

                        </div>
                        <div className="mt-4 sm:mt-0 flex flex-row sm:flex-col items-center sm:items-end justify-between sm:justify-center z-10">
                          <span className="text-xs font-extrabold px-4 py-2 rounded-xl shadow-sm border" style={{backgroundColor:STATUS_COLORS[a.status]+'15', color:STATUS_COLORS[a.status], borderColor:STATUS_COLORS[a.status]+'30'}}>
                            {a.status}
                          </span>
                          <p className="text-[10px] mt-2 font-bold text-slate-400 flex items-center bg-slate-50 px-2 py-1 rounded-md"><UserPlus size={10} className="mr-1.5"/> {a.ta}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Modal: Dashboard Details Popup */}
            {dashboardDetailModal && (
              <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl relative max-h-[85vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-300">
                  <div className="px-6 py-5 border-b bg-gradient-to-r from-slate-50 to-white flex justify-between items-center shadow-sm relative z-10">
                    <h3 className="font-extrabold text-xl text-slate-800 flex items-center">
                       <div className={`p-2 rounded-xl mr-3 ${dashboardDetailModal.type === 'vacancy' ? 'bg-blue-100 text-blue-700' : 'bg-indigo-100 text-indigo-700'}`}>
                         {dashboardDetailModal.type === 'vacancy' ? <Briefcase size={20}/> : <Users size={20}/>}
                       </div>
                       {dashboardDetailModal.title}
                       <span className="ml-4 bg-slate-800 text-white px-3 py-1 rounded-lg text-xs font-black shadow-md">{dashboardDetailModal.data.length} รายการ</span>
                    </h3>
                    <button onClick={()=>setDashboardDetailModal(null)} className="bg-white border border-slate-200 text-slate-400 hover:text-slate-800 hover:bg-slate-100 p-2 rounded-full transition-colors shadow-sm"><X size={18}/></button>
                  </div>
                  <div className="overflow-y-auto p-6 space-y-4 flex-1 bg-slate-50/50 hide-scrollbar">
                    {dashboardDetailModal.data.length === 0 ? (
                      <div className="text-center text-slate-400 py-16 flex flex-col items-center">
                        <Search size={56} className="text-slate-200 mb-4"/>
                        <p className="font-bold text-lg">ไม่มีข้อมูลที่ตรงกับสถานะนี้</p>
                      </div>
                    ) : (
                      dashboardDetailModal.data.map((item, idx) => (
                        <div key={item.id || idx} className="p-5 border border-slate-200 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:shadow-md hover:border-blue-300 transition-all bg-white group">
                          {dashboardDetailModal.type === 'vacancy' ? (
                            <>
                              <div className="text-sm">
                                <p className="font-extrabold text-lg text-slate-800 mb-2">{item.position}</p>
                                <div className="text-slate-500 flex flex-col sm:flex-row font-medium gap-2 sm:items-center">
                                  <div className="flex items-center bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100">
                                    <MapPin size={12} className="mr-1.5 text-slate-400"/> <span className="font-bold">{item.branchName}</span> 
                                    <span className="mx-2 text-slate-300">|</span> 
                                    <span className="text-blue-600 font-extrabold uppercase text-[10px]">{item.area}</span>
                                  </div>
                                  {/* แสดงข้อมูลผู้สมัครที่ทำให้สถานะสำเร็จ */}
                                  {['Hired', 'Waiting to Join'].includes(item.insight.computedStatus) && (
                                    <div className="text-[11px] text-slate-500 flex items-center bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-lg border border-indigo-100 font-bold">
                                      <UserPlus size={12} className="mr-1.5"/>
                                      คนสมัคร: <span className="ml-1">{item.insight.matchedApplicants.find(a => ['ผ่านสัมภาษณ์', 'รอเริ่มงาน'].includes(a.status))?.name || 'ไม่ระบุ'}</span>
                                    </div>
                                  )}
                                  {/* แสดงข้อมูลวันที่มีผลของ Promote&Transfer Done */}
                                  {item.insight.computedStatus === 'Promote&Transfer Done' && item.effectiveDate && (
                                    <div className="text-[11px] flex items-center bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-lg border border-emerald-100 font-bold">
                                      <Clock size={12} className="mr-1.5"/>
                                      มีผล: <span className="ml-1">{new Date(item.effectiveDate).toLocaleDateString('th')}</span>
                                    </div>
                                  )}
                                </div>
                              </div>
                              <div className="text-left sm:text-right shrink-0 w-full sm:w-auto flex justify-end">
                                <span className="text-xs font-extrabold px-4 py-2 rounded-xl shadow-sm border" style={{backgroundColor:VACANCY_COLORS[item.insight.computedStatus]+'15', color:VACANCY_COLORS[item.insight.computedStatus], borderColor:VACANCY_COLORS[item.insight.computedStatus]+'30'}}>
                                  {item.insight.computedStatus}
                                </span>
                              </div>
                            </>
                          ) : (
                            <>
                              <div className="text-sm">
                                <p className="font-extrabold text-lg text-slate-800 mb-2">{item.name}</p>
                                <div className="text-slate-500 flex items-center flex-wrap gap-2 font-medium">
                                  <span className="flex items-center bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100"><Briefcase size={12} className="mr-1.5 text-slate-400"/> <span className="font-bold">{item.position}</span></span>
                                  <span className="flex items-center bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100"><MapPin size={12} className="mr-1.5 text-slate-400"/> <span className="font-bold">{item.branchName}</span></span>
                                  <span className="flex items-center bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100"><Phone size={12} className="mr-1.5 text-slate-400"/> <span className="font-bold">{item.phone}</span></span>
                                  
                                  {item.resumeBase64 && item.resumeBase64 !== 'Uploaded' && !String(item.resumeBase64).startsWith('Error') && (
                                    <button onClick={(e) => handleViewResume(e, item.resumeBase64, item.resumeName)} className="text-[11px] text-blue-700 hover:text-white font-bold flex items-center bg-blue-50 hover:bg-blue-600 px-3 py-1 rounded-lg transition-all border border-blue-200 shadow-sm">
                                      <Eye size={12} className="mr-1.5" /> ดูเรซูเม่
                                    </button>
                                  )}
                                  {item.resumeBase64 === 'Uploaded' && (
                                    <span className="text-[11px] text-slate-500 font-bold flex items-center bg-slate-100 px-3 py-1 rounded-lg border border-slate-200" title="ไฟล์ถูกบันทึกบน Cloud แล้ว">
                                      <CheckCircle2 size={12} className="mr-1.5 text-emerald-500" /> มีไฟล์แนบ
                                    </span>
                                  )}
                                  {item.resumeBase64 && String(item.resumeBase64).startsWith('Error') && (
                                    <span className="text-[11px] text-red-600 font-bold flex items-center bg-red-50 px-3 py-1 rounded-lg border border-red-200" title={item.resumeBase64}>
                                      <AlertCircle size={12} className="mr-1.5" /> อัปโหลดล้มเหลว
                                    </span>
                                  )}
                                </div>
                              </div>
                              <div className="text-left sm:text-right shrink-0 w-full sm:w-auto flex flex-row sm:flex-col justify-between sm:justify-end items-center sm:items-end gap-2 mt-3 sm:mt-0">
                                <span className="text-xs font-extrabold px-4 py-2 rounded-xl shadow-sm border" style={{backgroundColor:(STATUS_COLORS[item.status]||'#cbd5e1')+'15', color:STATUS_COLORS[item.status]||'#64748b', borderColor: (STATUS_COLORS[item.status]||'#cbd5e1')+'30'}}>
                                  {item.status}
                                </span>
                                <p className="text-[10px] font-bold text-slate-400 flex items-center bg-slate-50 px-2 py-1 rounded-md"><UserPlus size={10} className="mr-1.5"/> {item.ta}</p>
                              </div>
                            </>
                          )}
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}
            
            {/* Modal: Preview File */}
            {previewFile && (
              <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md animate-in fade-in duration-300">
                <div className="bg-white p-2 rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col relative shadow-2xl animate-in zoom-in-95">
                  <div className="absolute -top-5 -right-5 flex space-x-3">
                    <button onClick={() => handleDownloadFile(previewFile.base64, previewFile.name)} className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-full p-3 shadow-lg shadow-blue-500/40 transition-all hover:-translate-y-1 border border-white/20" title="ดาวน์โหลดไฟล์"><Download size={22}/></button>
                    <button onClick={()=>setPreviewFile(null)} className="bg-white hover:bg-slate-100 text-slate-800 rounded-full p-3 shadow-lg transition-all hover:-translate-y-1 border border-slate-200" title="ปิดหน้าต่าง"><X size={22}/></button>
                  </div>
                  {previewFile.base64.startsWith('data:image/') || previewFile.base64.startsWith('data:application/pdf') ? 
                    <iframe src={previewFile.base64} className="w-full h-full rounded-2xl border border-slate-200 bg-slate-50 shadow-inner"/> : 
                    <div className="flex-1 flex flex-col items-center justify-center text-center p-8 bg-slate-50 rounded-2xl border border-slate-100">
                      <div className="w-24 h-24 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mb-6 shadow-inner"><FileText size={48} /></div>
                      <h3 className="font-extrabold text-2xl mb-8 text-slate-800 max-w-xl truncate">{previewFile.name}</h3>
                      <button onClick={() => handleDownloadFile(previewFile.base64, previewFile.name)} className="bg-slate-800 hover:bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold flex items-center shadow-xl hover:-translate-y-1 transition-all">
                        <Download size={22} className="mr-3"/> ดาวน์โหลดไฟล์ไปยังเครื่อง
                      </button>
                    </div>
                  }
                </div>
              </div>
            )}

            {/* ไอคอน Settings สำหรับเมนูต่างๆ (ฟังก์ชันนี้ไม่เปลี่ยน) */}
            <Database className="hidden"/> 
          </main>
        </div>
      );
    }

    // สร้าง Component เปล่าๆ ป้องกัน Error ขาด Icon
    function Database(props) { return <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>; }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
